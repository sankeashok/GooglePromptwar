name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: lifebridge
  REGION: us-central1
  VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Diagnostic: Check Config'
        run: |
          gcloud config list
          gcloud auth list

      - name: Build and Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE_NAME }}'
          region: '${{ env.REGION }}'
          source: .
          project_id: '${{ env.PROJECT_ID }}'
          env_vars: |
            VITE_GEMINI_API_KEY=${{ env.VITE_GEMINI_API_KEY }}
          flags: '--allow-unauthenticated --port 8080'

      - name: Show Output URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)'
